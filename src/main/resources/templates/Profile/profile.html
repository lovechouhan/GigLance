<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Home Page</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="min-h-screen px-8 py-10 bg-white text-slate-900">

            <!-- Profile Header -->
            <div class="max-w-5xl mx-auto mb-8">
                <div class="flex items-center gap-6 px-6 py-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                    <div class="flex items-center justify-center overflow-hidden bg-gray-100 rounded-full w-28 h-28">
                        <img th:if="${loggedInUser != null and loggedInUser.imageUrl != null}"
                             th:src="${loggedInUser.imageUrl}"
                             alt="avatar" class="object-cover w-full h-full" />
                        <svg th:if="${loggedInUser == null or loggedInUser.imageUrl == null}" xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 15c2.761 0 5.317.833 7.379 2.253M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>

                    <div class="flex-1">
                        <h1 class="text-2xl font-extrabold text-slate-900" th:text="${loggedInUser != null ? loggedInUser.name : 'Guest User'}">Guest User</h1>
                        <p class="mt-1 text-sm text-slate-500" th:text="${loggedInUser != null ? loggedInUser.email : ''}"></p>

                        <div class="flex items-center gap-3 mt-3">
                            <span class="px-3 py-1 text-xs font-semibold text-indigo-700 rounded-full bg-indigo-50" th:text="${userRole}">ROLE</span>
                            <a th:if="${userRole == 'ROLE_FREELANCER'}" th:href="@{/freelancer/profile/edit}"
                               class="px-3 py-1 text-sm font-medium text-white bg-indigo-600 rounded-lg">Edit Profile</a>
                            <a th:if="${userRole == 'ROLE_CLIENT'}" th:href="@{/client/profile/edit}"
                               class="px-3 py-1 text-sm font-medium text-white bg-indigo-600 rounded-lg">Edit Profile</a>
                        </div>
                    </div>

                    <div class="text-right">
                        <p class="text-sm text-slate-500">Member Since</p>
                        <p class="mt-1 text-sm text-slate-700" th:if="${loggedInUser != null and loggedInUser.createdAt != null}" th:text="${#temporals.format(loggedInUser.createdAt,'dd MMM yyyy')}">N/A</p>
                    </div>
                </div>
            </div>

            <div class="grid max-w-5xl grid-cols-1 gap-6 mx-auto lg:grid-cols-3">
                <!-- Left / Main -->
                <div class="lg:col-span-2">
                    <div class="p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                        <h2 class="text-lg font-semibold text-slate-900">About</h2>
                        <p class="mt-3 text-sm text-slate-700" th:if="${loggedInUser != null and loggedInUser.bio != null}" th:text="${loggedInUser.bio}">No bio available.</p>
                        <p class="mt-3 text-sm text-slate-500" th:if="${loggedInUser == null or loggedInUser.bio == null}">No bio available.</p>

                        <!-- Role specific panels -->
                        <div th:if="${userRole == 'ROLE_FREELANCER'}" class="mt-6">
                            <h3 class="font-medium text-md text-slate-900">Freelancer Profile</h3>
                            <div class="grid grid-cols-1 gap-4 mt-4 sm:grid-cols-2">
                                
                                <div class="p-4 bg-white border rounded-lg">
                                    <div class="text-xs text-slate-500">Rating</div>
                                    <div class="mt-2 text-lg font-bold text-slate-900" th:text="${loggedInUser.rating != null ? loggedInUser.rating : '—'}">—</div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <div class="text-xs text-slate-500">Skills</div>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span th:each="skill : ${loggedInUser.skills}" class="px-3 py-1 text-xs bg-gray-100 rounded-full text-slate-800" th:text="${skill}"></span>
                                    <span th:if="${loggedInUser.skills == null or #lists.isEmpty(loggedInUser.skills)}" class="text-sm text-slate-500">No skills added.</span>
                                </div>
                            </div>
                        </div>

                        <div th:if="${userRole == 'ROLE_CLIENT'}" class="mt-6">
                            <h3 class="font-medium text-md text-slate-900">Client Summary</h3>
                            <div class="grid grid-cols-1 gap-4 mt-4 sm:grid-cols-3">
                                <div class="p-4 bg-white border rounded-lg">
                                    <div class="text-xs text-slate-500">Total Spent</div>
                                    <div class="mt-2 text-lg font-bold text-slate-900" th:text="${totalSpent != null ? '₹' + totalSpent : '₹0'}">₹0</div>
                                </div>
                                <div class="p-4 bg-white border rounded-lg">
                                    <div class="text-xs text-slate-500">Active Projects</div>
                                    <div class="mt-2 text-lg font-bold text-slate-900" th:text="${activeProjects != null ? activeProjects : 0}">0</div>
                                </div>
                                <div class="p-4 bg-white border rounded-lg">
                                    <div class="text-xs text-slate-500">Proposals Received</div>
                                    <div class="mt-2 text-lg font-bold text-slate-900" th:text="${proposalsReceived != null ? proposalsReceived : 0}">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right / Sidebar -->
                <aside>
                    <div class="p-6 bg-white border border-gray-100 shadow-sm rounded-2xl">
                        <h3 class="text-sm font-medium text-slate-900">Contact</h3>
                        <div class="mt-3 text-sm text-slate-700">
                            <p th:if="${loggedInUser != null and loggedInUser.phone != null}"><span class="font-medium">Phone: </span><span th:text="${loggedInUser.phone}"></span></p>
                            <p class="mt-2"><span class="font-medium">Email: </span><span th:text="${loggedInUser != null ? loggedInUser.email : ''}"></span></p>
                        </div>

                        <div class="mt-6">
                            <a th:if="${userRole == 'ROLE_FREELANCER'}" th:href="@{/freelancer/projects}"
                               class="block w-full px-4 py-2 text-center text-white bg-indigo-600 rounded-lg">View My Projects</a>
                            <a th:if="${userRole == 'ROLE_CLIENT'}" th:href="@{/client/myprojects}"
                               class="block w-full px-4 py-2 text-center text-white bg-indigo-600 rounded-lg">View My Projects</a>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>
</body>
</html>
