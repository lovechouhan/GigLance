<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
    <title>All Clients - Admin</title>
</head>

<body>
<div layout:fragment="content" class="min-h-screen p-8 bg-gray-100 md:ml-64">

    <!-- Header -->
     <header class="flex items-center justify-between p-6 mb-8 shadow-lg bg-slate-800 rounded-xl"
       style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
    
    <style>
      :root {
        --header-bg-color: #4c6ae2;
        --header-bg-color-light: #4c6ae2;
        --header-text-color: #ffffff;
        --header-subtext-color: #cbd5e1;
      }
      
      header {
        background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
      }
    </style>
        <div>
            <h1 class="text-2xl font-bold text-white">All Clients</h1>
            <!-- <p class="mt-1 text-sm text-slate-300">Discover and connect with the perfect talent for your next project.</p> -->
        </div>
        <a th:href="@{/client/dashboard}"
           class="flex items-center gap-2 px-4 py-2 text-sm font-medium transition bg-white rounded-lg shadow-md text-slate-800 hover:bg-gray-100 hover:shadow-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Dashboard
        </a>
    </header>

    <!-- Filters -->
    
    <!-- Clients Grid -->
    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div th:each="client : ${clients}" 
             class="p-6 transition bg-white border-l-4 border-blue-500 shadow-lg rounded-xl hover:shadow-2xl">
            
            <!-- Client Avatar & Name -->
            <div class="flex items-center gap-4 mb-4">
                <div class="flex items-center justify-center w-12 h-12 rounded-full bg-gradient-to-br from-blue-400 to-purple-600">
                    <span class="text-lg font-bold text-white" th:text="${#strings.substring(client.name, 0, 1).toUpperCase()}">C</span>
                </div>
                <div>
                    <p class="text-sm font-semibold text-gray-500">CLIENT NAME</p>
                    <p class="text-lg font-bold text-gray-900" th:text="${client.name}">Client Name</p>
                </div>
            </div>

            <!-- Contact Information -->
            <div class="pb-4 mb-4 space-y-3 border-b border-gray-200">
                <!-- Email -->
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <div>
                        <p class="text-xs font-semibold text-gray-500">EMAIL</p>
                        <p class="text-sm text-gray-700 break-all" th:text="${client.email}">email@example.com</p>
                    </div>
                </div>

                <!-- Phone -->
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                    <div>
                        <p class="text-xs font-semibold text-gray-500">PHONE</p>
                        <p class="text-sm text-gray-700" th:text="${client.phone!= null ? client.phone  : 'Not provided'}">Not provided</p>
                    </div>
                </div>
            </div>

            <!-- Location -->
            <div class="mb-4">
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    
                </div>
            </div>

            <!-- Account Info -->
            <div class="grid grid-cols-2 gap-3 p-3 mb-4 rounded-lg bg-gray-50">
                <div>
                    <p class="text-xs font-semibold text-gray-500">ACCOUNT TYPE</p>
                    <p class="text-sm font-medium text-gray-900">Client</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-gray-500">JOINED</p>
                    <p class="text-sm font-medium text-gray-900" th:text="${#temporals.format(client.createdAt, 'MMM yyyy')}">Jan 2024</p>
                </div>
            </div>

            <!-- View Profile Button -->
            <a th:href="@{/admin/clientprofile/{id}(id=${client.id})}"
               class="inline-flex items-center justify-center w-full gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-blue-600 rounded-lg hover:bg-blue-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                View Profile
            </a>
        </div>
    </div>

    <!-- No Clients Message -->
    <div th:if="${#lists.isEmpty(clients)}" class="p-12 text-center bg-white shadow-lg rounded-xl">
        <svg class="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 12H9m4 5h4m0 0h4m-4 0v4m0 0v-4m-8-1h8a2 2 0 012 2v2a2 2 0 01-2 2H7a2 2 0 01-2-2v-2a2 2 0 012-2z"/>
        </svg>
        <p class="text-lg font-semibold text-gray-700">No clients found</p>
        <p class="mt-2 text-sm text-gray-500">Try adjusting your filters or check back later</p>
    </div>

</div>
</body>

</html>
