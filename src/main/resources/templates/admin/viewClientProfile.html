<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Client Profile </title>
</head>
<body>
<div layout:fragment="content">
    <div class="min-h-screen px-4 py-8 bg-gray-100 sm:px-6 lg:px-8">
        <div class="max-w-6xl mx-auto mb-8">
            <div class="p-6 bg-slate-800 rounded-xl">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <h1 class="text-xl font-bold text-white">Client Profile</h1>
                        <p class="text-sm text-white">View client information</p>
                    </div>
                    <a href="/admin/allclients" class="px-4 py-2 text-black bg-white rounded-lg">Back</a>
                </div>
            </div>
        </div>
        <div th:if="${client == null}" class="max-w-6xl mx-auto">
            <div class="p-6 text-center bg-white rounded-xl">
                <p class="text-gray-600">Client not found.</p>
                <a href="/admin/allclients" class="inline-block px-4 py-2 mt-4 text-white bg-blue-600 rounded-lg">Back to Clients</a>
            </div>
        </div>
        <div th:if="${client != null}">
        <div class="max-w-6xl mx-auto mb-8">
            <div class="overflow-hidden bg-white shadow-lg rounded-xl">
                <div class="p-6 bg-white">
                    <div class="flex flex-col items-center gap-6 md:flex-row md:items-start">
                        <div class="relative">
                            <img th:src="${client.imageUrl != null ? client.imageUrl : '/images/image.png'}" class="object-cover w-20 h-20 shadow-lg rounded-xl">
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <h2 class="text-2xl font-bold text-black" th:text="${client.name}">Client Name</h2>
                            <span class="inline-flex items-center gap-1 px-3 py-1 mt-2 text-xs font-semibold text-blue-600 border rounded-full bg-blue-50">Client</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="max-w-6xl mx-auto mb-8">
            <div class="grid grid-cols-1 gap-6 md:grid-cols-3">
                <div class="overflow-hidden bg-white shadow-lg md:col-span-2 rounded-xl">
                    <div class="px-6 py-4"><h3 class="text-lg font-bold text-black">About</h3></div>
                    <div class="p-6">
                        <p class="leading-relaxed text-black" th:text="${client.bio != null ? client.bio : 'No bio added.'}">Bio...</p>
                    </div>
                </div>
                <div class="overflow-hidden bg-white shadow-lg rounded-xl">
                    <div class="px-6 py-4"><h3 class="text-lg font-bold text-black">Contact</h3></div>
                    <div class="p-6 space-y-4">
                        <div><p class="text-xs text-gray-500">Phone</p><p class="font-medium text-gray-800" th:text="${client.phone != null ? client.phone : 'N/A'}"></p></div>
                        <div><p class="text-xs text-gray-500">Email</p><p class="font-medium text-gray-800" th:text="${client.email}"></p></div>
                        <div><p class="text-xs text-gray-500">Website</p><p class="font-medium text-gray-800" th:text="${client.website != null ? client.website : 'No website'}"></p></div>
                        <div><p class="text-xs text-gray-500">Address</p><p class="font-medium text-gray-800" th:text="${client.address != null ? client.address : 'N/A'}"></p></div>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>
</div>
</body>
</html>
