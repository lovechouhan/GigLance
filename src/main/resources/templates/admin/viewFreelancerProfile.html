<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Freelancer Profile (Admin)</title>
</head>
<body>
<div layout:fragment="content">
    <div class="min-h-screen px-6 py-12 bg-gray-100">
        <div class="w-full max-w-4xl mx-auto overflow-hidden bg-white border border-gray-200 shadow-xl rounded-2xl">
            <div class="p-8">
                <div class="flex flex-col items-center gap-8 md:flex-row">
                    <div class="relative">
                        <img th:src="${freelancer.imageUrl != null ? freelancer.imageUrl : '/images/image.png'}" class="object-cover w-20 h-20 border border-black rounded-full shadow-xl" />
                        <span th:if="${freelancer.verified}" class="absolute flex items-center justify-center w-8 h-8 rounded-full bottom-2 right-2 bg-emerald-500 ring-4 ring-slate-800">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                        </span>
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <h1 class="text-4xl font-bold text-black md:text-5xl" th:text="${freelancer.name}">Freelancer Name</h1>
                        <p class="mt-2 text-lg text-black" th:text="${freelancer.designation}">Designation</p>
                        <div class="flex items-center justify-center gap-4 mt-4 md:justify-start">
                            <div class="flex items-center gap-1 px-3 py-1 rounded-full bg-amber-500/20">
                                <span class="text-amber-400">★</span>
                                <span class="font-semibold text-black" th:text="${freelancer.rating}">—</span>
                            </div>
                            <span th:if="${freelancer.verified}" class="inline-flex items-center gap-1 px-3 py-1 text-sm font-semibold bg-green-600 rounded-full text-emerald-100">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                                Verified
                            </span>
                        </div>
                        <p class="mt-3 text-sm text-black">Member Since:
                            <span class="font-medium text-black" th:text="${#temporals.format(freelancer.memberSince, 'dd MMM yyyy')}">N/A</span>
                        </p>
                    </div>
                </div>
            </div>
            <div class="p-8">
                <div class="mb-8">
                    <h2 class="flex items-center gap-2 mb-3 text-xl font-bold text-slate-800">About</h2>
                    <p class="leading-relaxed text-black" th:text="${freelancer.bio != null ? freelancer.bio : 'No bio added.'}">Bio...</p>
                </div>
                <div class="mb-8">
                    <h2 class="flex items-center gap-2 mb-4 text-xl font-bold text-slate-800">Skills</h2>
                    <div class="flex flex-wrap gap-3">
                        <span th:each="skill : ${freelancer.skills}" class="px-4 py-2 text-sm font-medium transition border rounded-full text-slate-700 bg-slate-100 border-slate-200">
                            <span th:text="${skill}"></span>
                        </span>
                    </div>
                </div>
                <div class="mb-8">
                    <h2 class="flex items-center gap-2 mb-4 text-xl font-bold text-slate-800">Contact</h2>
                    <div class="grid gap-4 md:grid-cols-2">
                        <div class="p-5 transition border border-blue-100 rounded-xl bg-blue-50">
                            <p class="text-sm text-blue-600">Email</p>
                            <p class="font-semibold text-slate-800" th:text="${freelancer.email}"></p>
                        </div>
                        <div class="p-5 transition border rounded-xl bg-emerald-50 border-emerald-100">
                            <p class="text-sm text-emerald-600">Phone</p>
                            <p class="font-semibold text-slate-800" th:text="${freelancer.phone}"></p>
                        </div>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-6 border-t border-gray-200">
                    <a href="/admin/allfreelancers" class="inline-flex items-center gap-2 px-5 py-3 font-medium transition rounded-xl text-slate-700 bg-slate-100 hover:bg-slate-200">
                        Back to Freelancers
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
