<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
    <title>Client Notifications | GigLance</title>
</head>

<body>

<div layout:fragment="content"
     class="min-h-screen p-8 bg-gray-100 text-slate-900">

    <!-- PAGE HEADER -->
    <header class="flex items-center justify-between p-6 mb-8 shadow-lg rounded-2xl"
        style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
    
    <style>
      :root {
        --header-bg-color: #4c6ae2;
        --header-bg-color-light: #4c6ae2;
        --header-text-color: #ffffff;
        --header-subtext-color: #cbd5e1;
      }
      
      header {
        background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
      }
    </style>
        <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 shadow-lg bg-amber-500 rounded-xl shadow-amber-500/30">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-white">Notifications</h1>
                <p class="text-sm text-slate-400">Stay updated with your project activities</p>
            </div>
        </div>
        <a th:href="@{/client/dashboard}"
           class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-slate-800 bg-white rounded-xl hover:bg-gray-100 transition-all duration-200 shadow-md hover:shadow-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Dashboard
        </a>
    </header>

    <!-- EMPTY STATE -->
    <div th:if="${notifications.size() == 0}"
         class="p-12 text-center bg-white border border-gray-200 shadow-sm rounded-2xl">
        <div class="flex items-center justify-center w-16 h-16 mx-auto mb-4 rounded-full bg-slate-100">
            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
        </div>
        <p class="text-lg font-semibold text-slate-700">No notifications yet</p>
        <p class="mt-1 text-sm text-slate-500">You'll see updates about your projects here</p>
    </div>

    <!-- NOTIFICATIONS LIST -->
    <div th:each="notification : ${notifications}"
         class="mb-4 overflow-hidden transition-shadow duration-200 bg-white border border-gray-200 shadow-sm rounded-2xl hover:shadow-md">

        <!-- Notification Header -->
        <div class="flex items-center justify-between px-6 py-4 bg-slate-800">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center w-10 h-10 bg-blue-500 shadow-md rounded-xl shadow-blue-500/30">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-black" th:text="${notification.title}"></h3>
            </div>
            
            <!-- Unread Badge -->
            <span th:if="${!notification.readStatus}" 
                  class="flex items-center gap-1.5 px-3 py-1 text-xs font-bold text-white bg-red-500 rounded-full">
                <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
                Unread
            </span>
        </div>

        <!-- Notification Body -->
        <div class="p-6">
            <div class="flex items-start justify-between gap-6">
                <div class="flex-1">
                    <!-- Message -->
                    <p class="leading-relaxed text-slate-700" th:text="${notification.message}"></p>

                    <!-- Date -->
                    <div class="flex items-center gap-2 mt-4">
                        <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-amber-100">
                            <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <span class="text-sm text-slate-500"
                              th:text="${notification.createdAt.format(T(java.time.format.DateTimeFormatter).ofPattern('dd MMM yyyy'))}">
                        </span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex items-center gap-3">
                    <a th:href="@{'/client/review/' + ${notification.id} + '?notificationId=' + ${notification.id}}"
                       class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700 transition-all duration-200 shadow-md hover:shadow-lg hover:shadow-blue-500/30">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        Review Submission
                    </a>
                    
                    <!-- Delete Button -->
                    <a th:href="@{'/client/notification/' + ${notification.id} + '/delete'}"
                       class="flex items-center justify-center w-10 h-10 transition-all duration-200 text-slate-400 bg-slate-100 rounded-xl hover:bg-red-100 hover:text-red-600"
                       title="Delete notification"
                       onclick="return confirm('Are you sure you want to delete this notification?');">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
