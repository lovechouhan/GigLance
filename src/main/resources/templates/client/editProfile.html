<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Edit Client Profile</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="min-h-screen px-4 py-8 bg-gray-100 sm:px-6 lg:px-8">

            <!-- Page Header -->
            <div class="max-w-2xl mx-auto mb-8">
                <div class="p-6 shadow-lg bg-slate-800 rounded-xl"
                        style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
                    <style>
                        :root {
                            --header-bg-color: #4c6ae2;
                            --header-bg-color-light: #4c6ae2;
                            --header-text-color: #ffffff;
                            --header-subtext-color: #cbd5e1;
                        }
                    </style>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center justify-center w-10 h-10 bg-blue-500 rounded-lg shadow-lg shadow-blue-500/30">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                </svg>
                            </div>
                            <div>
                                <h1 class="text-xl font-bold text-white">Edit Profile</h1>
                                <p class="text-sm text-slate-300">Update your client information</p>
                            </div>
                        </div>
                        <a th:href="@{/client/profile/{id}(id=${client.id})}" 
                           class="flex items-center gap-2 px-4 py-2 transition-colors bg-white rounded-lg text-slate-800 hover:bg-slate-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                            </svg>
                            Back
                        </a>
                    </div>
                </div>
            </div>

            <!-- Edit Form -->
            <div class="max-w-2xl mx-auto">
                <div class="overflow-hidden bg-white shadow-lg rounded-xl">
                    <form th:action="@{/client/profile/save/{id}(id=${client.id})}" th:object="${client}" method="POST" enctype="multipart/form-data">
                        
                        <!-- Personal Information Section -->
                        <div class="px-6 py-4 border-b ">
                            <h3 class="flex items-center gap-2 text-lg font-bold text-black">
                                <div class="flex items-center justify-center w-8 h-8 bg-blue-500 rounded-lg shadow-lg shadow-blue-500/30">
                                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                Personal Information
                            </h3>
                        </div>

                        <div class="p-6 space-y-6">
                            <!-- Profile Image -->
                            <div>
                                <label class="block mb-3 text-sm font-semibold text-gray-700">Profile Picture</label>
                                <div class="flex items-center gap-4">
                                    <img th:src="${client.imageUrl != null ? client.imageUrl : '/images/image.png'}"
                                         class="object-cover w-20 h-20 rounded-lg ring-2 ring-blue-500">
                                    <div>
                                        <input type="file" name="profileImage" accept="image/*"
                                               class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600">
                                        <p class="mt-2 text-xs text-gray-500">PNG, JPG up to 10MB</p>
                                    </div>
                                </div>
                            </div>

                            <!-- Name -->
                            <div>
                                <label for="name" class="block mb-2 text-sm font-semibold text-gray-700">Full Name</label>
                                <input type="text" id="name" th:field="*{name}" required
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>

                            <!-- Email -->
                            <div>
                                <label for="email" class="block mb-2 text-sm font-semibold text-gray-700">Email Address</label>
                                <input type="email" id="email" th:field="*{email}" required readonly
                                       class="w-full px-4 py-2 text-gray-600 border border-gray-300 rounded-lg cursor-not-allowed bg-gray-50">
                                <p class="mt-2 text-xs text-gray-500">Email cannot be changed</p>
                            </div>

                            <!-- Phone -->
                            <div>
                                <label for="phone" class="block mb-2 text-sm font-semibold text-gray-700">Phone Number</label>
                                <input type="tel" id="phone" th:field="*{phone}"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       placeholder="e.g., +1 (555) 123-4567">
                            </div>

                            <!-- Bio -->
                            <div>
                                <label for="bio" class="block mb-2 text-sm font-semibold text-gray-700">Bio / About</label>
                                <textarea id="bio" th:field="*{bio}" rows="4"
                                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                          placeholder="Tell us about yourself..."></textarea>
                            </div>
                        </div>

                        <!-- Contact Section -->
                        <div class="px-6 py-4 border-t border-b ">
                            <h3 class="flex items-center gap-2 text-lg font-bold text-black">
                                <div class="flex items-center justify-center w-8 h-8 rounded-lg shadow-lg bg-emerald-500 shadow-emerald-500/30">
                                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                    </svg>
                                </div>
                                Contact Information
                            </h3>
                        </div>

                        <div class="p-6 space-y-6">
                            <!-- Website (if needed) -->
                            <div>
                                <label for="website" class="block mb-2 text-sm font-semibold text-gray-700">Website (Optional)</label>
                                <input type="url" id="website" name="website"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       placeholder="https://example.com">
                            </div>

                            <!-- Company Name -->
                            <div>
                                <label for="companyName" class="block mb-2 text-sm font-semibold text-gray-700">Company Name (Optional)</label>
                                <input type="text" id="companyName" name="companyName"
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                       placeholder="Your company name">
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="flex gap-4 px-6 py-4 border-t bg-gray-50">
                            <button type="submit" 
                                    class="flex-1 px-4 py-2 font-medium text-white transition-all bg-blue-500 rounded-lg hover:bg-blue-600 hover:shadow-lg hover:shadow-blue-500/30">
                                <svg class="inline w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                Save Changes
                            </button>
                            <a th:href="@{/client/profile/{id}(id=${client.id})}"
                               class="flex-1 px-4 py-2 font-medium text-gray-700 transition-colors border border-gray-300 rounded-lg hover:bg-gray-100">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
