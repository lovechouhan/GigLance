<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>My Projects</title>
</head>

<body class="bg-gray-100">
    <div layout:fragment="content">
      <!-- Header -->
      <header class="flex items-center justify-between p-6 mb-8 shadow-lg bg-slate-800 rounded-2xl"
        style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
    
    <style>
      :root {
        --header-bg-color: #4c6ae2;
        --header-bg-color-light: #4c6ae2;
        --header-text-color: #ffffff;
        --header-subtext-color: #cbd5e1;
      }
      
      header {
        background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
      }
    </style>
        <div>
          <h1 class="text-3xl font-bold text-white">My Projects</h1>
          <p class="mt-1 text-white">Projects you have posted</p>
        </div>
        <a th:href="@{/client/dashboard}"
           class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-black bg-white rounded-lg hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to Dashboard
        </a>
      </header>

      <main class="px-4 mx-auto">
        <!-- Project Cards Grid -->
        <div th:unless="${#lists.isEmpty(projects)}">
          <div class="grid gap-6 md:grid-cols-4 sm:grid-cols-2 xs:grid-cols-1">
            <div class="overflow-hidden transition-all bg-white border border-gray-100 shadow-md rounded-2xl hover:shadow-xl"
                 th:each="project : ${projects}">
              
              <!-- Card Header -->
              <div class="p-4 ">
                <div class="flex items-center justify-between">
                  <h3 class="text-lg font-bold text-black truncate" th:text="${project.title}">Project Title</h3>
                  <span class="flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded-full"
                    th:classappend="${project.status == 'OPEN' ? 'text-emerald-700 bg-emerald-100' : (project.status == 'IN_PROGRESS' ? 'text-amber-700 bg-amber-100' : (project.status == 'COMPLETED' ? 'text-blue-700 bg-blue-100' : 'text-slate-700 bg-slate-200'))}"
                    th:text="${project.status}">
                    Status
                  </span>
                </div>
              </div>

              <!-- Card Body -->
              <div class="p-5">
                <p class="mb-4 text-sm text-gray-600 line-clamp-2" th:text="${project.description}">Project description</p>

                <!-- Info Boxes -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                  <div class="flex items-center gap-2 p-2.5 bg-emerald-50 rounded-lg border border-emerald-100">
                    <div class="p-1.5 bg-emerald-500 rounded-md">
                      <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                      </svg>
                    </div>
                    <div>
                      <p class="text-xs text-emerald-600">Budget</p>
                      <p class="text-sm font-semibold text-emerald-700" th:text="${project.budget != null ? '₹' + project.budget : '--'}">--</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-2 p-2.5 bg-amber-50 rounded-lg border border-amber-100">
                    <div class="p-1.5 bg-amber-500 rounded-md">
                      <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                      </svg>
                    </div>
                    <div>
                      <p class="text-xs text-amber-600">Deadline</p>
                      <p class="text-sm font-semibold text-amber-700" th:if="${project.deadline != null}" th:text="${#temporals.format(project.deadline, 'yyyy-MM-dd')}">--</p>
                      <p class="text-sm font-semibold text-amber-700" th:if="${project.deadline == null}">--</p>
                    </div>
                  </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex gap-2 pt-3 border-t border-gray-100">
                  <a th:href="@{/client/projects/viewdetails/{id}(id=${project.id})}"
                    class="flex items-center justify-center gap-1.5 flex-1 px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                    View
                  </a>
                  <a th:if="${project.status == 'OPEN'}"
                     th:href="@{/client/projects/delete/{id}(id=${project.id})}"
                     class="flex items-center justify-center gap-1.5 px-4 py-2.5 text-sm font-medium text-white bg-red-500 border border-red-200 rounded-lg hover:bg-red-300 hover:shadow-lg hover:shadow-red-500/20 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    Delete
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div class="mt-10 text-center" th:if="${#lists.isEmpty(projects)}">
          <div class="max-w-md p-10 mx-auto bg-white shadow-lg rounded-2xl">
            <div class="flex items-center justify-center w-20 h-20 mx-auto mb-6 bg-blue-100 rounded-full">
              <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              </svg>
            </div>
            <h3 class="mb-2 text-xl font-bold text-gray-800">No Projects Yet</h3>
            <p class="mb-6 text-gray-500">Post your first project and start finding talented freelancers</p>
            <a th:href="@{/client/postproject}" class="inline-flex items-center gap-2 px-6 py-3 text-white transition-all bg-blue-600 rounded-lg hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/30">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Post Project
            </a>
          </div>
        </div>
      </main>
    </div>
</body>
</html>
