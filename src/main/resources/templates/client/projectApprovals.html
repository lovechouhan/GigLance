<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Task Approval Requests</title>
</head>

<body>

<div layout:fragment="content" class="p-6">

    <!-- Header -->
    <header class="p-4 mb-8 border rounded-xl bg-gradient-to-r from-purple-700 to-indigo-600">
        <h1 class="text-3xl font-bold text-white">Task Approval Requests</h1>
        <p class="mt-1 text-purple-200">Review pending progress requests for this project.</p>
    </header>

    <!-- Approvals Section -->
    <div class="space-y-5">

        <div th:if="${#lists.isEmpty(pendingTasks)}"
             class="p-6 text-center text-gray-600 bg-white shadow rounded-xl">
            No pending approval requests.
        </div>

        <!-- Task Card -->
        <div th:each="task : ${pendingTasks}"
             class="p-5 transition bg-white border shadow rounded-xl hover:shadow-lg">

            <div class="flex items-center justify-between">
                
                <!-- Task Info -->
                <div>
                    <h3 class="text-xl font-semibold text-gray-900" 
                        th:text="${task.title}">Task Title</h3>

                    <p class="mt-1 text-sm text-gray-600">
                        Current Progress: 
                        <span class="font-semibold text-blue-600" th:text="${task.taskprogress}"></span>%
                    </p>

                    <p class="text-sm text-gray-600">
                        Requested Progress Increase:
                        <span class="font-semibold text-yellow-600" th:text="${task.requestedProgress}"></span>%
                    </p>
                </div>

                <!-- Approve / Reject -->
                <div class="flex gap-3">

                    <button th:onclick="'approveTask(' + ${task.id} + ')'"
                            class="px-4 py-2 text-white bg-green-600 rounded-lg hover:bg-green-700">
                        Approve
                    </button>

                    <button th:onclick="'rejectTask(' + ${task.id} + ')'"
                            class="px-4 py-2 text-white bg-red-600 rounded-lg hover:bg-red-700">
                        Reject
                    </button>

                </div>
            </div>

        </div>

    </div>

</div>


<!-- JS for Approve/Reject -->
<th:block layout:fragment="script">

<script>
function approveTask(taskId) {
    fetch(`/client/tasks/approve/${taskId}`, {
        method: "POST"
    })
    .then(() => location.reload())
    .catch(err => console.error(err));
}

function rejectTask(taskId) {
    fetch(`/client/tasks/reject/${taskId}`, {
        method: "POST"
    })
    .then(() => location.reload())
    .catch(err => console.error(err));
}
</script>

</th:block>

</body>
</html>
