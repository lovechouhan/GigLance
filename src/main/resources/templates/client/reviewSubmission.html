<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Review Work Submission</title>
</head>

<body>
   <div layout:fragment="content" 
     class="min-h-screen p-8 bg-[#F7FAFF] text-slate-900">

    <!-- PAGE HEADER -->
    <header
        class="flex items-center justify-between p-4 mb-8 bg-white border border-purple-300 shadow-sm rounded-2xl">
        
        <h1 class="text-3xl font-bold text-purple-700">
            📄 Review Work Submission
        </h1>

        <a th:href="@{/client/notifications}"
           class="px-4 py-2 text-white bg-purple-600 rounded-lg hover:bg-purple-700">
            ← Back to Notifications
        </a>
    </header>

    <!-- ERROR STATE - No Submission Found -->
    <div th:if="${submission == null}" class="max-w-3xl p-6 mx-auto bg-white border border-red-300 shadow-md rounded-2xl">
        <div class="text-center">
            <p class="text-lg font-semibold text-red-700">❌ Submission Not Found</p>
            <p class="mt-2 text-gray-600">The work submission you're trying to review doesn't exist or has been deleted.</p>
            <a th:href="@{/client/notifications}" class="inline-block px-4 py-2 mt-4 text-white bg-purple-600 rounded-lg hover:bg-purple-700">
                ← Back to Notifications
            </a>
        </div>
    </div>

    <!-- MAIN CARD -->
    <div th:if="${submission != null}" class="max-w-3xl p-6 mx-auto bg-white border shadow-md rounded-2xl">

        <!-- TASK SECTION -->
        <div class="mb-6">
            <h2 class="mb-2 text-xl font-semibold text-indigo-700">
                📝 Task Information
            </h2>

            <div class="p-4 border bg-slate-50 rounded-xl">
                <p class="text-lg font-bold text-slate-900">
                    <span th:text="${submission.task != null ? submission.task.title : 'N/A'}"></span>
                </p>

                <p class="mt-1 text-sm text-gray-600">
                    <strong>Project:</strong> 
                    <span th:text="${submission.task != null && submission.task.project != null ? submission.task.project.title : 'N/A'}"></span>
                </p>
            </div>
        </div>

        <!-- MESSAGE FROM FREELANCER -->
        <div class="mb-6">
            <h2 class="mb-2 text-xl font-semibold text-indigo-700">
                💬 Message from Freelancer
            </h2>

            <div class="p-4 border bg-slate-50 rounded-xl">
                <p class="leading-relaxed text-gray-700"
                   th:text="${submission.message}"></p>
            </div>
        </div>

        <!-- GITHUB LINK -->
        <div th:if="${submission.githubLink}" class="mb-6">
            <h2 class="mb-2 text-xl font-semibold text-indigo-700">
                🔗 Submitted GitHub Link
            </h2>

            <a th:href="${submission.githubLink}" target="_blank"
               class="inline-flex items-center gap-2 px-4 py-2 text-white bg-black rounded-lg hover:bg-gray-900">

                <i class="text-xl fa-brands fa-github"></i>
                <span>View on GitHub</span>
            </a>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="flex justify-end gap-4 mt-8">

            <a th:href="@{'/client/submission/reject/' + ${submission.id} + '?notificationId=' + ${notificationId}}"
               class="px-5 py-3 font-semibold text-white bg-red-800 shadow rounded-xl hover:bg-red-900">
                 ❌ Reject
            </a>

            <a th:href="@{'/client/submission/approve/' + ${submission.id} + '?notificationId=' + ${notificationId}}"
               class="px-5 py-3 font-semibold text-white bg-green-600 shadow rounded-xl hover:bg-green-700">
                 ✅ Approve
            </a>
        </div>

    </div>
</div>

</body>
</html>
