<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Freelancer Profile</title>
</head>

<body>
    <div layout:fragment="content">
    <div class="min-h-screen px-6 py-12 bg-gray-100">

    <!-- Profile Container -->
    <div class="w-full max-w-4xl mx-auto overflow-hidden bg-white border border-gray-200 shadow-xl rounded-2xl">

        <!-- Dark Header -->
        <div class="p-8">
            <div class="flex flex-col items-center gap-8 md:flex-row">

                <!-- Profile Image -->
                <div class="flex flex-col items-center md:items-start">
                    <div class="relative">
                        <img th:src="@{/images/image.png}"
                             class="object-cover w-20 h-20 border border-black rounded-full shadow-xl" />
                        <span th:if="${freelancer.verified}" class="absolute flex items-center justify-center w-8 h-8 rounded-full bottom-2 right-2 bg-emerald-500 ring-4 ring-slate-800">
                            <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <!-- Profile Info -->
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-4xl font-bold text-black md:text-5xl" th:text="${freelancer.name}">Freelancer Name</h1>
                    <p class="mt-2 text-lg text-black" th:text="${freelancer.designation}">Full Stack Developer</p>

                    <div class="flex items-center justify-center gap-4 mt-4 md:justify-start">
                        <div class="flex items-center gap-1 px-3 py-1 rounded-full bg-amber-500/20">
                            <span class="text-amber-400">★</span>
                            <span class="font-semibold text-black" th:text="${freelancer.rating}">4.9</span>
                        </div>
                        <span th:if="${freelancer.verified}" class="inline-flex items-center gap-1 px-3 py-1 text-sm font-semibold bg-green-600 rounded-full text-emerald-100">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                            Verified
                        </span>
                    </div>

                    <p class="mt-3 text-sm text-black">Member Since: 
                        <span class="font-medium text-black" th:text="${#temporals.format(freelancer.memberSince, 'dd MMM yyyy')}"></span>
                    </p>
                </div>
            </div>
        </div>

        <div class="p-8">
            <!-- Bio Section -->
            <div class="mb-8">
                <h2 class="flex items-center gap-2 mb-3 text-xl font-bold text-slate-800">
                    <span class="flex items-center justify-center w-8 h-8 text-blue-600 bg-blue-100 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </span>
                    About
                </h2>
                <p class="leading-relaxed text-black" th:text="${freelancer.bio}">Bio comes here...</p>
            </div>

            <!-- Skills -->
            <div class="mb-8">
                <h2 class="flex items-center gap-2 mb-4 text-xl font-bold text-slate-800">
                    <span class="flex items-center justify-center w-8 h-8 text-purple-600 bg-purple-100 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </span>
                    Skills
                </h2>
                <div class="flex flex-wrap gap-3">
                    <span th:each="skill : ${freelancer.skills}"
                          class="px-4 py-2 text-sm font-medium transition border rounded-full text-slate-700 bg-slate-100 border-slate-200 hover:bg-blue-50 hover:text-blue-700 hover:border-blue-200">
                        <span th:text="${skill}"></span>
                    </span>
                </div>
            </div>

            <!-- Contact Section -->
            <div class="mb-8">
                <h2 class="flex items-center gap-2 mb-4 text-xl font-bold text-slate-800">
                    <span class="flex items-center justify-center w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </span>
                    Contact
                </h2>

                <div class="grid gap-4 md:grid-cols-2">
                    <div class="p-5 transition border border-blue-100 rounded-xl bg-blue-50 hover:shadow-md">
                        <div class="flex items-center gap-3">
                            <span class="flex items-center justify-center w-10 h-10 bg-blue-600 rounded-lg">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                                </svg>
                            </span>
                            <div>
                                <p class="text-sm text-blue-600">Email</p>
                                <p class="font-semibold text-slate-800" th:text="${freelancer.email}"></p>
                            </div>
                        </div>
                    </div>

                    <div class="p-5 transition border rounded-xl bg-emerald-50 border-emerald-100 hover:shadow-md">
                        <div class="flex items-center gap-3">
                            <span class="flex items-center justify-center w-10 h-10 rounded-lg bg-emerald-600">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                                </svg>
                            </span>
                            <div>
                                <p class="text-sm text-emerald-600">Phone</p>
                                <p class="font-semibold text-slate-800" th:text="${freelancer.phone}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex items-center justify-between pt-6 border-t border-gray-200">
                <a href="/client/findfreelancers" class="inline-flex items-center gap-2 px-5 py-3 font-medium transition rounded-xl text-slate-700 bg-slate-100 hover:bg-slate-200">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Back to Projects
                </a>

                <a th:href="@{/invite/client/{id}/{freelancerId}(id=${loggedInUser.id}, freelancerId=${freelancer.id})}"
                   class="inline-flex items-center gap-2 px-6 py-3 font-semibold text-white transition bg-blue-600 rounded-xl hover:bg-blue-700 hover:shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Hire This Freelancer
                </a>
            </div>
        </div>

    </div>

</div>

    </div>
</body>
</html>
