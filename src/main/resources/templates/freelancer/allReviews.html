<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>All Reviews</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="max-w-6xl p-6 mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-4xl font-bold text-gray-900">All Reviews</h1>
                    <a href="#" th:href="@{/freelancer/dashboard/{id}(id=${freelancer.id})}" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-all">
                        Back to Dashboard
                    </a>
                </div>

                <!-- Rating Summary -->
                <div class="p-6 bg-white border border-gray-200 rounded-2xl shadow-sm">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
                        <!-- Freelancer Info -->
                        <div>
                            <h2 class="text-lg font-semibold text-gray-900" th:text="${freelancer.name}">Freelancer Name</h2>
                            <p class="text-sm text-gray-600" th:text="${freelancer.designation}">Designation</p>
                        </div>

                        <!-- Average Rating -->
                        <div class="flex items-center gap-4">
                            <div>
                                <p class="text-sm text-gray-600">Average Rating</p>
                                <p class="text-3xl font-bold text-amber-600" th:text="${#numbers.formatDecimal(averageRating ?: 0, 1, 1)}">0.0</p>
                            </div>
                            <div class="flex gap-1">
                                <span class="w-5 h-5 text-amber-400 fill-current">★</span>
                                <span class="w-5 h-5 text-amber-400 fill-current">★</span>
                                <span class="w-5 h-5 text-amber-400 fill-current">★</span>
                                <span class="w-5 h-5 text-gray-300 fill-current">★</span>
                                <span class="w-5 h-5 text-gray-300 fill-current">★</span>
                            </div>
                        </div>

                        <!-- Total Reviews Count -->
                        <div>
                            <p class="text-sm text-gray-600">Total Reviews</p>
                            <p class="text-3xl font-bold text-blue-600" th:text="${totalReviews}">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Reviews List -->
            <div class="space-y-4">
                <!-- Empty State -->
                <div th:if="${reviews == null or reviews.isEmpty()}" class="p-12 text-center bg-white border border-gray-200 rounded-2xl shadow-sm">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v12a2 2 0 01-2 2h-3l-4 4z"/>
                    </svg>
                    <h3 class="text-lg font-semibold text-gray-900">No Reviews Yet</h3>
                    <p class="mt-2 text-gray-600">Complete projects to start receiving reviews from clients.</p>
                </div>

                <!-- Review Cards -->
                <th:block th:if="${reviews != null and !reviews.isEmpty()}">
                    <div th:each="review : ${reviews}" class="p-6 bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md transition-all duration-200">
                        <!-- Review Header -->
                        <div class="flex items-start justify-between mb-4 pb-4 border-b border-gray-100">
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900" th:text="${review.project != null ? review.project.title : 'Project Review'}">Project Title</h3>
                                <p class="text-sm text-gray-600 mt-1">
                                    <span th:text="${review.reviewer != null ? review.reviewer.name : 'Client'}">Reviewer Name</span>
                                    <span class="text-gray-400 mx-2">•</span>
                                    <span th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</span>
                                </p>
                            </div>
                        </div>

                        <!-- Review Comment -->
                        <div class="mb-4">
                            <p class="text-gray-700 leading-relaxed" th:text="${review.comment}">Review comment goes here</p>
                        </div>

                        <!-- Project Info (if available) -->
                        <div th:if="${review.project != null}" class="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                            <p class="text-xs font-semibold text-blue-900 uppercase">Project Details</p>
                            <p class="text-sm text-blue-800 mt-1">
                                <span class="font-medium" th:text="${review.project.title}">Project</span>
                                <span class="text-blue-600 mx-2">|</span>
                                <span th:text="${'Budget: ' + review.project.budget + ' ₹'}">Budget</span>
                            </p>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</body>
</html>
