<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
  <title>Completed Projects</title>
</head>
<body>
  <div layout:fragment="content">
    
    <!-- Main content -->
    <main class="min-h-screen p-6 bg-gray-100">
      
      <!-- Header -->
      <header class="flex items-center justify-between p-6 mb-8 bg-slate-800 rounded-xl"
       style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
    
    <style>
      :root {
        --header-bg-color: #4c6ae2;
        --header-bg-color-light: #4c6ae2;
        --header-text-color: #ffffff;
        --header-subtext-color: #cbd5e1;
      }
      
      header {
        background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
      }
    </style>
        <div>
          <h1 class="text-2xl font-bold text-white">Completed Projects</h1>
          <p class="mt-1 text-white">View all your successfully completed projects</p>
        </div>
        <a th:href="@{/client/dashboard}"
           class="flex items-center gap-2 px-4 py-2.5 text-sm font-medium text-slate-800 bg-white rounded-lg hover:bg-gray-100 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to Dashboard
        </a>
      </header>

      <!-- Projects Grid -->
      <div th:if="${completedProjects != null and !#lists.isEmpty(completedProjects)}" class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
        <div th:each="project : ${completedProjects}" class="overflow-hidden transition-all duration-300 bg-white border border-gray-200 shadow-sm rounded-xl hover:shadow-lg hover:-translate-y-1">
          
          <!-- Card Header -->
          <div class="p-4 bg-white">
            <div class="flex items-start justify-between">
              <h3 class="text-lg font-semibold text-black" th:text="${project.title} ?: 'Untitled Project'">Project Title</h3>
              <span class="flex items-center gap-1.5 px-2.5 py-1 text-xs font-semibold text-emerald-700 bg-emerald-100 rounded-full">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                <span th:text="${project.status} ?: 'Completed'">Completed</span>
              </span>
            </div>
          </div>

          <!-- Card Body -->
          <div class="p-4">
            <!-- Client Info -->
            <div class="flex items-center gap-3 p-3 border border-blue-200 rounded-lg bg-blue-50">
              <div class="flex items-center justify-center w-10 h-10 bg-blue-100 rounded-lg">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <div>
                <p class="text-xs font-medium tracking-wide text-blue-600 uppercase">Client</p>
                <p class="text-sm font-semibold text-slate-800" th:text="${project.client.name}">Client Name</p>
              </div>
            </div>

            <!-- Success Badge -->
            <div class="flex items-center gap-2 p-3 mt-3 border rounded-lg bg-emerald-50 border-emerald-200">
              <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span class="text-sm font-medium text-emerald-700">Successfully Delivered</span>
            </div>
          </div>

          <!-- Card Footer -->
          <div class="flex items-center gap-3 p-4 border-t border-gray-100 bg-gray-50">
            <a th:href="@{/freelancer/project/{id}(id=${project.id})}" 
               class="flex items-center justify-center flex-1 gap-2 px-4 py-2.5 text-sm font-medium text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              View Work
            </a>
            <a th:href="@{/freelancer/project/details/{id}(id=${project.id})}" 
               class="flex items-center justify-center flex-1 gap-2 px-4 py-2.5 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Details
            </a>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div th:if="${completedProjects == null or #lists.isEmpty(completedProjects)}" class="p-12 text-center bg-white border border-gray-200 shadow-sm rounded-xl">
        <div class="flex items-center justify-center w-16 h-16 mx-auto mb-4 rounded-full bg-slate-100">
          <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
        </div>
        <h3 class="text-lg font-semibold text-slate-800">No Completed Projects</h3>
        <p class="mt-1 text-slate-500">Your completed projects will appear here once finished.</p>
      </div>

    </main>
  </div>
</body>
</html>
