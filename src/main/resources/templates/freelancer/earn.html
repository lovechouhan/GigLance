<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
  <title>Earnings & Wallet</title>
</head>

<body>
  <div layout:fragment="content">

    <div class="min-h-screen p-6 bg-gray-100">
      <div class="max-w-full mx-auto">

        <!-- Header -->
        <header class="flex items-center justify-between p-6 mb-8 bg-slate-800 rounded-xl"
           style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
    
    <style>
      :root {
        --header-bg-color: #4c6ae2;
        --header-bg-color-light: #4c6ae2;
        --header-text-color: #ffffff;
        --header-subtext-color: #cbd5e1;
      }
      
      header {
        background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
      }
    </style>
          <div>
            <h1 class="text-2xl font-bold text-white">Earnings & Wallet</h1>
            <p class="mt-1 text-white">View all your earnings and wallet details here.</p>
          </div>
           <a th:href="@{/freelancer/dashboard/{id}(id=${freelancer.id})}"
             class="flex items-center gap-2 px-4 py-2 text-sm font-medium transition-colors bg-white rounded-lg text-slate-800 hover:bg-gray-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Dashboard
          </a>
        </header>

        <!-- Wallet Card -->
        <div class="p-6 mb-6 bg-white border border-gray-200 shadow-sm rounded-xl">
          <div class="flex items-center gap-6">
            <!-- Icon -->
            <div class="flex items-center justify-center w-16 h-16 border bg-emerald-100 rounded-xl border-emerald-200">
              <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <!-- Info -->
            <div class="flex-1">
              <p class="text-sm font-medium tracking-wide uppercase text-slate-500">Total Earnings</p>
              <h1 class="mt-1 text-4xl font-bold text-slate-800"
                  th:text="${'₹' + #numbers.formatDecimal(totalEarnings, 1, 'COMMA', 2, 'POINT')}">₹0.00</h1>
              <p class="mt-2 text-sm text-slate-500">Available for withdrawal:
                <span class="font-semibold text-emerald-600"
                      th:text="${'₹' + #numbers.formatDecimal(availableBalance, 1, 'COMMA', 2, 'POINT')}">₹0.00</span>
              </p>
            </div>
            <!-- Action -->
           
          </div>
        </div>

        <!-- Metrics Row -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="p-4 bg-white border border-gray-200 shadow-sm rounded-xl">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-10 h-10 bg-blue-100 border border-blue-200 rounded-lg">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <div>
                <div class="text-xs font-medium tracking-wide uppercase text-slate-500">Today</div>
                <div class="mt-0.5 text-xl font-bold text-slate-800"
                     th:text="${'₹' + #numbers.formatDecimal(todayEarnings, 1, 'COMMA', 2, 'POINT')}">₹0.00</div>
              </div>
            </div>
          </div>
          <div class="p-4 bg-white border border-gray-200 shadow-sm rounded-xl">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-10 h-10 border rounded-lg bg-amber-100 border-amber-200">
                <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <div>
                <div class="text-xs font-medium tracking-wide uppercase text-slate-500">This Week</div>
                <div class="mt-0.5 text-xl font-bold text-slate-800"
                     th:text="${'₹' + #numbers.formatDecimal(weekEarnings, 1, 'COMMA', 2, 'POINT')}">₹0.00</div>
              </div>
            </div>
          </div>
          <div class="p-4 bg-white border border-gray-200 shadow-sm rounded-xl">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-10 h-10 bg-purple-100 border border-purple-200 rounded-lg">
                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
              </div>
              <div>
                <div class="text-xs font-medium tracking-wide uppercase text-slate-500">This Month</div>
                <div class="mt-0.5 text-xl font-bold text-slate-800"
                     th:text="${'₹' + #numbers.formatDecimal(monthEarnings, 1, 'COMMA', 2, 'POINT')}">₹0.00</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Earnings -->
        <div class="overflow-hidden bg-white border border-gray-200 shadow-sm rounded-xl">
          <div class="px-6 py-4 bg-white border-b border-slate-700">
            <h3 class="text-lg font-semibold text-black">Recent Earnings</h3>
          </div>
          <ul class="divide-y divide-gray-100" th:if="${#lists.isEmpty(recentEarnings)}">
            <li class="px-6 py-4 text-sm text-slate-500">No earnings recorded yet.</li>
          </ul>
          <ul class="divide-y divide-gray-100" th:if="${!#lists.isEmpty(recentEarnings)}">
            <li class="flex items-center justify-between px-6 py-4 transition-colors hover:bg-gray-50"
                th:each="earning : ${recentEarnings}">
              <div class="flex items-center gap-4">
                <div class="flex items-center justify-center w-10 h-10 border rounded-lg bg-emerald-100 border-emerald-200">
                  <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
                <div>
                  <div class="font-medium text-slate-800"
                       th:text="${earning.project != null ? earning.project.title : 'Payment'}">Payment</div>
                  <div class="text-sm text-slate-500">
                    <span th:text="${earning.paymentInfo != null ? earning.paymentInfo.paymentStatus : 'UNKNOWN'}">Status</span>
                    •
                    <span th:text="${earning.createdAt != null ? #temporals.format(earning.createdAt, 'dd MMM yyyy') : 'N/A'}">Date</span>
                  </div>
                </div>
              </div>
              <div class="text-lg font-bold text-emerald-600"
                   th:text="${'+ ₹' + #numbers.formatDecimal(earning.amount != null ? earning.amount : (earning.paymentInfo != null ? earning.paymentInfo.amount : 0), 1, 'COMMA', 2, 'POINT')}">+ ₹0.00</div>
            </li>
          </ul>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
