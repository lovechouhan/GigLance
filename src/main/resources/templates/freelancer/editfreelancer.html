<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Edit Profile | GigLance</title>
</head>

<body>
<div layout:fragment="content" class="min-h-screen px-6 py-10 bg-gray-100">

    <!-- PAGE HEADER -->
    <header class="flex items-center justify-between p-6 mb-8 bg-slate-800 rounded-2xl">
        <div>
            <h1 class="text-2xl font-bold text-white">Edit Profile</h1>
            <p class="text-slate-400">Update your details and personalize your freelancer profile</p>
        </div>
        <a th:href="@{/freelancer/dashboard}"
           class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium transition bg-white rounded-lg text-slate-800 hover:bg-slate-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Dashboard
        </a>
    </header>

    <!-- CARD -->
    <div class="max-w-4xl p-8 mx-auto bg-white border border-gray-200 shadow-lg rounded-2xl">

        <form th:action="@{/freelancer/update-profile}" method="post" enctype="multipart/form-data">

            <!-- Hidden Fields -->
            <input type="hidden" name="id" th:value="${freelancer.id}">
            <input type="hidden" name="email" th:value="${freelancer.email}">

            <!-- PROFILE IMAGE -->
            <div class="flex items-center gap-6 p-6 mb-8 border rounded-xl bg-slate-50 border-slate-200">
                <div class="relative">
                    <img th:src="${freelancer.imageUrl}" 
                         class="object-cover border-4 border-white rounded-full shadow-lg w-28 h-28"
                         alt="Profile Image">
                    <span class="absolute bottom-0 right-0 flex items-center justify-center w-8 h-8 bg-blue-600 rounded-full ring-4 ring-white">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </span>
                </div>

                <div class="flex-1">
                    <label class="block mb-2 font-semibold text-slate-700">Profile Photo</label>
                    <input type="file" name="image" 
                           class="block w-full p-3 text-sm bg-white border-2 border-dashed rounded-lg cursor-pointer text-slate-600 border-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <p class="mt-2 text-xs text-slate-500">JPG, PNG or GIF. Max size 2MB.</p>
                </div>
            </div>

            <!-- GRID FORM -->
            <div class="grid grid-cols-1 gap-6 md:grid-cols-2">

                <!-- Email (NON-EDITABLE) -->
                <div>
                    <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                        <span class="flex items-center justify-center w-6 h-6 text-xs rounded bg-slate-100 text-slate-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </span>
                        Email
                    </label>
                    <input type="email" th:value="${freelancer.email}" 
                           class="w-full p-3 border rounded-lg cursor-not-allowed text-slate-500 bg-slate-100 border-slate-200"
                           disabled>
                </div>

                <!-- Name -->
                <div>
                    <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                        <span class="flex items-center justify-center w-6 h-6 text-xs text-blue-600 bg-blue-100 rounded">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </span>
                        Full Name
                    </label>
                    <input type="text" name="name" th:value="${freelancer.name}" 
                           placeholder="Enter your name"
                           class="w-full p-3 transition border rounded-lg border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Phone -->
                <div>
                    <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                        <span class="flex items-center justify-center w-6 h-6 text-xs rounded bg-emerald-100 text-emerald-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                        </span>
                        Phone Number
                    </label>
                    <input type="text" name="phone" th:value="${freelancer.phone}"
                           placeholder="Enter phone number"
                           class="w-full p-3 transition border rounded-lg border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Designation -->
                <div>
                    <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                        <span class="flex items-center justify-center w-6 h-6 text-xs text-purple-600 bg-purple-100 rounded">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                        </span>
                        Designation
                    </label>
                    <input type="text" name="designation" th:value="${freelancer.designation}"
                           placeholder="Example: Full Stack Developer"
                           class="w-full p-3 transition border rounded-lg border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

            </div>

            <!-- BIO -->
            <div class="mt-6">
                <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                    <span class="flex items-center justify-center w-6 h-6 text-xs rounded bg-amber-100 text-amber-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
                        </svg>
                    </span>
                    Bio
                </label>
                <textarea name="bio" rows="5"
                          th:text="${freelancer.bio}"
                          placeholder="Write a short introduction about yourself..."
                          class="w-full p-3 transition border rounded-lg border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <!-- SKILLS INPUT -->
            <div class="mt-6">
                <label class="flex items-center gap-2 mb-2 font-semibold text-slate-700">
                    <span class="flex items-center justify-center w-6 h-6 text-xs rounded text-cyan-600 bg-cyan-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </span>
                    Skills
                </label>

                <div id="skillsContainer" class="flex flex-wrap gap-2 mb-3">
                    <!-- Existing skills -->
                    <span th:each="skill : ${freelancer.skills}"
                          class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-blue-700 bg-blue-100 rounded-lg skill-tag">
                        <span th:text="${skill}"></span>
                        <button type="button" class="font-bold text-blue-500 remove-skill hover:text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                        <input type="hidden" name="skills" th:value="${skill}">
                    </span>
                </div>

                <input id="skillInput" type="text" 
                       placeholder="Type a skill and press Enter"
                       class="w-full p-3 transition border rounded-lg border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- SAVE BUTTON -->
            <div class="flex items-center justify-end gap-4 pt-6 mt-8 border-t border-gray-200">
                <a th:href="@{/freelancer/dashboard}" class="px-6 py-3 font-semibold transition rounded-lg text-slate-700 bg-slate-100 hover:bg-slate-200">
                    Cancel
                </a>
                <button type="submit"
                        class="inline-flex items-center gap-2 px-6 py-3 font-semibold text-white transition bg-blue-600 rounded-lg hover:bg-blue-700 hover:shadow-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Save Changes
                </button>
            </div>

        </form>
    </div>
</div>

<!-- SKILLS SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const skillInput = document.getElementById("skillInput");
    const container = document.getElementById("skillsContainer");

    skillInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            const skill = skillInput.value.trim();

            if (skill !== "") {
                const tag = document.createElement("span");
                tag.className = "skill-tag bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-2";

                tag.innerHTML = `
                    <span>${skill}</span>
                    <button type="button" class="font-bold text-blue-500 remove-skill hover:text-red-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                    <input type="hidden" name="skills" value="${skill}">
                `;

                container.appendChild(tag);
                skillInput.value = "";
            }
        }
    });

    document.addEventListener("click", function(e) {
        if (e.target.classList.contains("remove-skill") || e.target.closest(".remove-skill")) {
            const tag = e.target.closest(".skill-tag");
            if (tag) tag.remove();
        }
    });

});
</script>

</body>
</html>
