<aside th:fragment="sidebar"
    id="logo-sidebar"
    class="fixed top-0 left-0 z-40 w-64 h-screen max-w-full text-white transition-transform duration-300 transform -translate-x-full"
    style="background: linear-gradient(to right, var(--sidebar-bg-color, #4c6ae2), var(--sidebar-bg-color-light, #4c6ae2));"
    data-theme="light">
    
    <style>
      :root {
        --sidebar-bg-color: #4c6ae2;
        --sidebar-bg-color-light: #4c6ae2;
        --sidebar-text-color: #ffffff;
        --sidebar-hover-bg: rgba(255, 255, 255, 0.15);
        --sidebar-border-color: #FF7675;
      }
      
      #logo-sidebar {
        background: linear-gradient(to right, var(--sidebar-bg-color), var(--sidebar-bg-color-light)) !important;
      }
      
      #logo-sidebar a {
        color: var(--sidebar-text-color);
      }
      
      #logo-sidebar a:hover {
        border-left-color: var(--sidebar-border-color);
        background-color: var(--sidebar-hover-bg);
      }
    </style>

  <script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.getElementById('logo-sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');
    const backdrop = document.getElementById('sidebar-backdrop');
    const html = document.documentElement;
    
    if (sidebar && toggleBtn) {
        function openSidebar() {
            sidebar.classList.remove('-translate-x-full');
            if (backdrop) backdrop.style.display = 'block';
        }
        
        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            if (backdrop) backdrop.style.display = 'none';
        }
        
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (sidebar.classList.contains('-translate-x-full')) {
                openSidebar();
            } else {
                closeSidebar();
            }
        });
        
        document.addEventListener('click', function(e) {
            if (!sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
                closeSidebar();
            }
        });
        
        if (backdrop) {
            backdrop.addEventListener('click', closeSidebar);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSidebar();
        });
    }
});
  </script>

  <div class="flex flex-col h-full px-3 py-4">
    <a href="/" class="flex items-center justify-center mb-5 p-3 rounded-lg bg-gradient-to-r from-[#6C5CE7] to-[#A29BFE]">
      <img src="/images/gig.jpg" class="h-16 border-2 border-white rounded-full" alt="Logo"/>
    </a>

    <ul class="space-y-2 font-medium">
        <!-- Sidebar links styled for the purple gradient background -->
        <li><a th:href="@{/freelancer/dashboard/{id}(id=${#authentication.principal.id})}" class="flex items-center p-3 text-white transition border-l-4 border-transparent rounded-lg hover:bg-white hover:text-purple-600 hover:shadow-md">Dashboard</a></li>
        <li><a th:href="@{'/freelancer/findProjects'}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#A29BFE] hover:to-[#6C5CE7] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]">Browse Projects</a></li>
        <li><a th:href="@{/freelancer/viewproposal/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#6C5CE7] hover:to-[#FF7675] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]">My Proposals</a></li>
        <li><a th:href="@{/freelancer/myprojects/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#FF7675] hover:to-[#A29BFE] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]">My Projects</a></li>
        <li><a th:href="@{/contracts/activeContracts/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#A29BFE] hover:to-[#FF7675] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]"> Active Contracts</a></li>
        <li><a th:href="@{/freelancer/completedProjects/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#6C5CE7] hover:to-[#A29BFE] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]"> Completed</a></li>
        <li><a th:href="@{/freelancer/earnings/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 text-white transition border-l-4 border-transparent rounded-lg hover:bg-gradient-to-r hover:from-emerald-500 hover:to-emerald-600 hover:text-white hover:shadow-md hover:border-emerald-600"> Earnings</a></li>
        <li><a th:href="@{/freelancer/invitations/{id}(id=${loggedInUser.id})}" class="flex items-center p-3 text-white transition border-l-4 border-transparent rounded-lg hover:bg-gradient-to-r hover:from-emerald-500 hover:to-emerald-600 hover:text-white hover:shadow-md hover:border-emerald-600"> Invitations</a></li>
        <li><a th:href="@{'/logout'}" class="flex items-center p-3 transition rounded-lg text-white hover:bg-gradient-to-r hover:from-[#FF7675] hover:to-[#FF9999] hover:text-white hover:shadow-md border-l-4 border-transparent hover:border-[#FF7675]"> Logout</a></li>
    </ul>
  </div>
</aside>
