<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">

<head>
    <title>Notifications | Freelancer</title>
</head>

<body>

<div layout:fragment="content"
     class="min-h-screen p-6 bg-gray-100">

    <!-- HEADER -->
    <header class="flex items-center justify-between p-6 mb-8 bg-blue-500 rounded-2xl">
        <div>
            <h1 class="text-2xl font-bold text-white">Notifications</h1>
            <p class="text-white">Stay updated with your latest activities</p>
        </div>
        <a th:href="@{/freelancer/dashboard/{id}(id=${#authentication.principal.id})}"
           class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium transition bg-white rounded-lg text-slate-800 hover:bg-slate-100">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Dashboard
        </a>
    </header>

    <!-- NOTIFICATIONS LIST -->
    <div class="space-y-4">

        <!-- No Notifications -->
        <div th:if="${notifications.size() == 0}"
             class="p-8 text-center bg-white border border-gray-200 shadow-sm rounded-2xl">
            <div class="flex items-center justify-center w-16 h-16 mx-auto mb-4 rounded-full bg-slate-100">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
            </div>
            <p class="text-lg font-medium text-slate-600">You have no notifications yet</p>
            <p class="mt-1 text-sm text-slate-400">We'll notify you when something happens</p>
        </div>

        <!-- Notification Card -->
        <div th:each="n : ${notifications}"
             class="overflow-hidden transition bg-white border border-gray-200 shadow-sm rounded-2xl hover:shadow-md hover:border-blue-200">

            <div class="flex items-center justify-between p-5">
                <!-- LEFT CONTENT -->
                <div class="flex items-start gap-4">
                    <div class="flex items-center justify-center w-12 h-12 bg-blue-100 rounded-xl">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <p class="text-lg font-semibold text-slate-800"
                           th:text="${n.message}">New message</p>

                        <div class="flex items-center gap-3 mt-2">
                            <p class="flex items-center gap-1 text-sm text-slate-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                </svg>
                                <span th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy • hh:mm a')}">15 Dec 2025 • 08:30 PM</span>
                            </p>
                            <span th:if="${!n.readStatus}" class="inline-flex items-center gap-1 px-2 py-1 text-xs font-semibold rounded-full text-amber-700 bg-amber-100">
                                <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
                                Unread
                            </span>
                            <span th:if="${n.readStatus}" class="inline-flex items-center gap-1 px-2 py-1 text-xs font-semibold rounded-full text-emerald-700 bg-emerald-100">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                </svg>
                                Read
                            </span>
                        </div>
                    </div>
                </div>

                <!-- RIGHT ACTIONS -->
                <div class="flex items-center gap-2">
                    <!-- Mark Read Button -->
                    <form th:if="${!n.readStatus}"
                          th:action="@{/freelancer/notifications/mark-read}"
                          method="post"
                          class="m-0">

                        <input type="hidden" name="notifId" th:value="${n.id}"/>

                        <button type="submit"
                            class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white transition bg-blue-600 rounded-lg hover:bg-blue-700">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            Mark as Read
                        </button>
                    </form>

                    <!-- Delete Button -->
                    <a th:href="@{'/freelancer/notification/' + ${n.id} + '/delete'}"
                       class="inline-flex items-center justify-center w-10 h-10 transition rounded-lg text-slate-400 hover:bg-red-100 hover:text-red-600"
                       title="Delete notification"
                       onclick="return confirm('Are you sure you want to delete this notification?');">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
