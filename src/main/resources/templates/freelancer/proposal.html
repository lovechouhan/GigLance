<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Proposals | GigLance</title>
</head>

<body>
<div layout:fragment="content"
     class="min-h-screen px-4 py-8 bg-gray-100">

    <div class="w-full max-w-full mx-auto">

        <!-- Page Header -->
        <header class="flex items-center justify-between p-6 mb-8 shadow-lg rounded-2xl"
                style="background: linear-gradient(to right, var(--header-bg-color, #4c6ae2), var(--header-bg-color-light, #4c6ae2));">
            
            <style>
              :root {
                --header-bg-color: #4c6ae2;
                --header-bg-color-light: #4c6ae2;
                --header-text-color: #ffffff;
                --header-subtext-color: #cbd5e1;
              }
              
              header {
                background: linear-gradient(to right, var(--header-bg-color), var(--header-bg-color-light)) !important;
              }
            </style>
            
            <div>
                <h1 class="text-3xl font-bold" style="color: var(--header-text-color);">My Proposals</h1>
                <p class="mt-1 text-sm" style="color: var(--header-subtext-color);">View and manage all your submitted proposals</p>
            </div>
            <a th:href="@{/freelancer/dashboard/{id}(id=${#authentication.principal.id})}"
               class="flex items-center gap-2 px-5 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 shadow-md"
               style="background-color: #ffffff; color: #1e293b;">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Back to Dashboard
            </a>
        </header>

        <!-- Filter Section -->
        <div class="flex items-center gap-4 mb-8">
            <div class="flex items-center gap-3 px-4 py-3 bg-white border border-gray-200 shadow-sm rounded-xl">
                <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                </svg>
                <select id="statusFilter"
                        class="px-3 py-1.5 text-gray-700 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none cursor-pointer">
                    <option value="">All Status</option>
                    <option value="ACCEPTED">Accepted</option>
                    <option value="PENDING">Pending</option>
                    <option value="REJECTED">Rejected</option>
                </select>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(proposals)}"
             class="p-12 text-center bg-white border border-gray-200 shadow-sm rounded-2xl">
            <div class="flex items-center justify-center w-16 h-16 mx-auto mb-4 rounded-full bg-slate-100">
                <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
            </div>
            <p class="text-lg font-semibold text-gray-800">No proposals found</p>
            <p class="mt-1 text-gray-500">Start submitting proposals to see them here</p>
        </div>

        <!-- Proposals Grid -->
        <div class="w-full" th:if="${proposals != null and !#lists.isEmpty(proposals)}">

            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">

                <div class="flex flex-col justify-between h-full overflow-hidden transition-all duration-300 bg-white border border-gray-200 proposal-card rounded-2xl hover:shadow-xl hover:-translate-y-1"
                     th:each="proposal : ${proposals}"
                     th:attr="data-status=${proposal.status.name()}">

                    <!-- Card Header -->
                    <div class="px-6 py-4 bg-white border-b border-slate-700">
                        <h2 class="text-lg font-bold text-black truncate"
                            th:text="${proposal.project.title}">
                            Project Title
                        </h2>
                        <p class="mt-1 text-sm text-black"
                           th:text="'Client: ' + ${proposal.client.name}">
                            Client: Client Name
                        </p>
                    </div>

                    <!-- Card Body -->
                    <div class="flex-grow p-6">
                        <div class="flex flex-col gap-4">

                            <!-- Bid Amount -->
                            <div class="flex items-center gap-3 p-3 bg-emerald-50 rounded-xl">
                                <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-emerald-500">
                                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                    </svg>
                                </div>
                                <div>
                                    <p class="text-xs font-medium text-emerald-600">Bid Amount</p>
                                    <p class="text-lg font-bold text-emerald-700" th:text="'₹' + ${proposal.bidAmount}">₹0</p>
                                </div>
                            </div>

                            <!-- Timeline & Date -->
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-blue-50 rounded-xl">
                                    <div class="flex items-center gap-2 mb-1">
                                        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                                        </svg>
                                        <span class="text-xs font-medium text-blue-600">Timeline</span>
                                    </div>
                                    <p class="text-sm font-bold text-blue-700" th:text="${proposal.timelineDays} + ' Days'">0 Days</p>
                                </div>
                                <div class="p-3 bg-purple-50 rounded-xl">
                                    <div class="flex items-center gap-2 mb-1">
                                        <svg class="w-4 h-4 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                        </svg>
                                        <span class="text-xs font-medium text-purple-600">Created</span>
                                    </div>
                                    <p class="text-sm font-bold text-purple-700" th:text="${#temporals.format(proposal.createdAt, 'dd MMM yyyy')}">01 Jan 2024</p>
                                </div>
                            </div>

                            <!-- Status Badge -->
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-medium text-gray-600">Status:</span>
                                <span class="px-3 py-1.5 text-xs font-bold rounded-lg"
                                      th:text="${proposal.status.name()}"
                                      th:class="${proposal.status.name() == 'ACCEPTED'} ? 'px-3 py-1.5 text-xs font-bold rounded-lg bg-emerald-500 text-white' : (${proposal.status.name() == 'REJECTED'} ? 'px-3 py-1.5 text-xs font-bold rounded-lg bg-red-500 text-white' : 'px-3 py-1.5 text-xs font-bold rounded-lg bg-amber-500 text-white')">
                                    Status
                                </span>
                            </div>

                        </div>
                    </div>

                    <!-- Card Footer -->
                    <div class="px-6 py-4 border-t border-gray-200 bg-slate-50">
                        <div class="flex flex-wrap items-center justify-center gap-2">
                            <!-- <a th:href="@{/proposals/downloadCoverLetter/{id}(id=${proposal.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 text-xs font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-all duration-200">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                Download
                            </a> -->

                            <a th:href="@{/projects/viewdetails/{id}(id=${proposal.project.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 text-xs font-semibold text-white bg-emerald-600 rounded-lg hover:bg-emerald-700 transition-all duration-200">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                </svg>
                                Project
                            </a>

                            <a th:href="@{/freelancer/client/viewprofile/{id}(id=${proposal.client.id})}"
                               class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 text-xs font-semibold text-white rounded-lg transition-all duration-200"
                               style="background-color: #FF6B35; border: none;">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                                Client
                            </a>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<th:block layout:fragment="proposalfilterscript">
<script>
document.addEventListener("DOMContentLoaded", function () {
    const statusFilter = document.getElementById("statusFilter");

    statusFilter.addEventListener("change", function () {
        const selectedStatus = this.value.toLowerCase();
        const cards = document.querySelectorAll(".proposal-card");

        cards.forEach(card => {
            const cardStatus = (card.dataset.status || "").toLowerCase();

            if (selectedStatus === "" || selectedStatus === cardStatus) {
                card.style.display = "flex";
            } else {
                card.style.display = "none";
            }
        });
    });
});
</script>
</th:block>

</body>
</html>
