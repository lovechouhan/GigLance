<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Freelancer Status</title>
</head>

<body>

<div layout:fragment="content" class="min-h-screen p-6 bg-gray-100">

    <!-- Button -->
    <button onclick="openModal()"
            class="inline-flex items-center gap-2 px-5 py-3 font-semibold text-white transition bg-blue-600 rounded-xl hover:bg-blue-700 hover:shadow-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        About Freelancer
    </button>

    <!-- Modal Overlay -->
    <div id="freelancerModal"
         class="fixed inset-0 z-50 items-center justify-center hidden bg-black/60 backdrop-blur-sm">

        <!-- Modal Box -->
        <div class="relative w-full max-w-lg mx-4 overflow-hidden bg-white shadow-2xl rounded-2xl animate-fadeIn">

            <!-- Dark Header -->
            <div class="p-6 bg-slate-800">
                <button onclick="closeModal()"
                        class="absolute text-white/70 top-4 right-4 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
                <h2 class="text-2xl font-bold text-white">Freelancer Information</h2>
            </div>

            <div class="p-6">
                <!-- Profile Section -->
                <div class="flex items-center gap-4 mb-6">
                    <div class="relative">
                        <img th:src="${freelancer.imageUrl}"
                             alt="Profile"
                             class="object-cover w-20 h-20 border-4 border-blue-100 rounded-full shadow-lg">
                        <span th:if="${freelancer.verified}" class="absolute bottom-0 right-0 flex items-center justify-center w-6 h-6 rounded-full bg-emerald-500 ring-2 ring-white">
                            <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                        </span>
                    </div>

                    <div>
                        <h3 class="text-xl font-bold text-slate-800" th:text="${freelancer.name}">John Doe</h3>
                        <p class="text-sm text-slate-500" th:text="${freelancer.designation}">Full Stack Developer</p>
                        <p th:if="${freelancer.verified}" class="inline-flex items-center gap-1 px-2 py-1 mt-1 text-xs font-semibold rounded-full text-emerald-700 bg-emerald-100">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                            </svg>
                            Verified Profile
                        </p>
                        <p th:if="${!freelancer.verified}" class="inline-flex items-center gap-1 px-2 py-1 mt-1 text-xs font-semibold text-red-700 bg-red-100 rounded-full">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                            Not Verified
                        </p>
                    </div>
                </div>

                <!-- Details Grid -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="p-3 border border-blue-100 rounded-xl bg-blue-50">
                        <p class="text-xs font-medium text-blue-600">Email</p>
                        <p class="text-sm font-semibold truncate text-slate-800" th:text="${freelancer.email}">email@example.com</p>
                    </div>
                    <div class="p-3 border rounded-xl bg-emerald-50 border-emerald-100">
                        <p class="text-xs font-medium text-emerald-600">Phone</p>
                        <p class="text-sm font-semibold text-slate-800" th:text="${freelancer.phone}">9876543210</p>
                    </div>
                    <div class="p-3 border rounded-xl bg-amber-50 border-amber-100">
                        <p class="text-xs font-medium text-amber-600">Hourly Rate</p>
                        <p class="text-sm font-semibold text-slate-800">₹<span th:text="${freelancer.hourlyRate}">1200</span>/hr</p>
                    </div>
                    <div class="p-3 border border-purple-100 rounded-xl bg-purple-50">
                        <p class="text-xs font-medium text-purple-600">Rating</p>
                        <p class="text-sm font-semibold text-slate-800">
                            <span class="text-amber-500">★</span>
                            <span th:text="${freelancer.rating}">4.9</span>
                        </p>
                    </div>
                </div>

                <div class="p-3 mb-4 border rounded-xl bg-slate-50 border-slate-200">
                    <p class="text-xs font-medium text-slate-500">Member Since</p>
                    <p class="text-sm font-semibold text-slate-800" th:text="${#temporals.format(freelancer.memberSince, 'dd MMM yyyy')}">12 Jan 2022</p>
                </div>

                <!-- Bio -->
                <div class="mb-4">
                    <p class="mb-2 text-sm font-semibold text-slate-700">Bio</p>
                    <p class="text-sm leading-relaxed text-slate-600" th:text="${freelancer.bio}">Lorem ipsum dolor sit amet.</p>
                </div>

                <!-- Skills -->
                <div>
                    <p class="mb-2 text-sm font-semibold text-slate-700">Skills</p>
                    <div class="flex flex-wrap gap-2">
                        <span th:each="skill : ${freelancer.skills}"
                              th:text="${skill}"
                              class="px-3 py-1 text-xs font-medium text-blue-700 border border-blue-200 rounded-full bg-blue-50">
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Modal Script -->
<script>
    function openModal() {
        const modal = document.getElementById('freelancerModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('freelancerModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }
</script>

<!-- Animation -->
<style>
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-10px) scale(0.95);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .animate-fadeIn {
        animation: fadeIn 0.25s ease-out;
    }
</style>

</body>
</html>
